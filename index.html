
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学生口算练习题生成器 v3</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#111827}.app{display:grid;grid-template-columns:1fr 340px;gap:24px;max-width:1280px;margin:0 auto;padding:24px}.preview-wrap{display:flex;justify-content:center;align-items:flex-start;overflow:auto;padding:24px;border-radius:28px;background:#e2e8f0}.paper{width:794px;min-height:1123px;background:#fff;padding:48px 56px;box-shadow:0 20px 60px rgba(15,23,42,.18)}.paper-header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:14px;margin-bottom:24px;border-bottom:1px solid #e5e7eb}.paper-title{margin:0;font-size:25px;font-weight:700;letter-spacing:1px}.paper-subtitle{margin-top:6px;color:#64748b;font-size:13px}.paper-info{color:#64748b;font-size:13px;white-space:nowrap}.questions{display:grid;grid-template-columns:repeat(3,1fr);column-gap:30px}.q-col{display:flex;flex-direction:column;gap:4px}.question{display:flex;align-items:baseline;gap:7px;min-height:24px;white-space:nowrap;font-size:16px;line-height:1.35}.index{width:26px;text-align:right;color:#94a3b8;font-size:11px}.answer{color:#64748b;margin-left:3px}.panel{position:sticky;top:24px;align-self:start;border-radius:28px;background:#fff;padding:24px;box-shadow:0 20px 50px rgba(15,23,42,.12)}.panel h2{margin:0;font-size:22px}.panel-desc{margin:6px 0 24px;color:#64748b;font-size:14px;line-height:1.6}.section{margin-bottom:22px}label.title{display:block;margin-bottom:10px;font-size:14px;font-weight:700}select{width:100%;height:44px;padding:0 14px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;font-size:15px}.type-list{display:grid;gap:10px;max-height:430px;overflow:auto;padding:14px;border-radius:18px;background:#f8fafc}.type-item{display:flex;align-items:flex-start;gap:10px;font-size:14px;line-height:1.45;cursor:pointer}.type-item input{margin-top:3px}.switch-row{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:18px;background:#f8fafc}.switch-title{font-weight:700;font-size:14px}.switch-desc{margin-top:4px;color:#64748b;font-size:12px}.switch{position:relative;width:48px;height:28px;flex-shrink:0}.switch input{display:none}.slider{position:absolute;inset:0;border-radius:999px;background:#cbd5e1;cursor:pointer;transition:.2s}.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.2)}.switch input:checked+.slider{background:#2563eb}.switch input:checked+.slider:before{transform:translateX(20px)}.buttons{display:grid;gap:12px}button{height:48px;border:0;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer}.btn-secondary{background:#e2e8f0;color:#0f172a}.btn-primary{background:#2563eb;color:#fff}.tip{margin-top:14px;color:#94a3b8;font-size:12px;line-height:1.6}@media(max-width:980px){.app{grid-template-columns:1fr}.panel{position:static;order:-1}}@media print{body{background:#fff}body *{visibility:hidden}#paper,#paper *{visibility:visible}#paper{position:absolute;left:0;top:0;width:210mm;min-height:297mm;padding:13mm 15mm;box-shadow:none}@page{size:A4;margin:0}}
  </style>
</head>
<body>
  <div class="app">
    <main class="preview-wrap"><section class="paper" id="paper"><header class="paper-header"><div><h1 class="paper-title">口算练习题</h1><div class="paper-subtitle" id="subtitle">1年级 · 共 90 题</div></div><div class="paper-info">姓名：________ 日期：________</div></header><div class="questions" id="questions"></div></section></main>
    <aside class="panel"><h2>练习设置</h2><p class="panel-desc">选择年级和题型，左侧会自动生成 A4 口算试卷。</p><div class="section"><label class="title" for="gradeSelect">年级</label><select id="gradeSelect"><option value="1">1年级</option><option value="2">2年级</option><option value="3">3年级</option><option value="4">4年级</option><option value="5">5年级</option><option value="6">6年级</option></select></div><div class="section"><label class="title">题型配置</label><div class="type-list" id="typeList"></div></div><div class="section"><div class="switch-row"><div><div class="switch-title">显示答案</div><div class="switch-desc">默认关闭，打开后题目后方显示答案。</div></div><label class="switch"><input type="checkbox" id="answerSwitch"/><span class="slider"></span></label></div></div><div class="buttons"><button class="btn-secondary" id="refreshBtn">随机换题</button><button class="btn-primary" id="downloadBtn">下载试卷</button></div><p class="tip">点击“下载试卷”会直接保存一张 PNG 图片。上传 GitHub Pages 时，只需要上传这个 HTML 文件并改名为 index.html。</p></aside>
  </div>
<script>
const STORAGE_KEY="mental_math_grade",QUESTION_COUNT=90;
const gradeConfigs={
1:[{id:"g1_add_10",label:"10以内的加法",type:"add",max:10},{id:"g1_sub_10",label:"10以内的减法",type:"sub",max:10},{id:"g1_add_20_no",label:"20以内的加法（不进位）",type:"add",max:20,noCarry:true},{id:"g1_add_20_carry",label:"20以内的加法（进位）",type:"add",max:20,needCarry:true},{id:"g1_sub_20_no",label:"20以内的减法（不退位）",type:"sub",max:20,noBorrow:true},{id:"g1_sub_20_borrow",label:"20以内的减法（退位）",type:"sub",max:20,needBorrow:true},{id:"g1_add_100_no",label:"100以内的加法（不进位）",type:"add",max:100,noCarry:true},{id:"g1_add_100_carry",label:"100以内的加法（进位）",type:"add",max:100,needCarry:true},{id:"g1_sub_100_no",label:"100以内的减法（不退位）",type:"sub",max:100,noBorrow:true},{id:"g1_sub_100_borrow",label:"100以内的减法（退位）",type:"sub",max:100,needBorrow:true},{id:"g1_2d_add_no",label:"两位数的加法（不进位）",type:"add",min:10,max:99,noCarry:true},{id:"g1_2d_add_carry",label:"两位数的加法（进位）",type:"add",min:10,max:99,needCarry:true},{id:"g1_2d_sub_no",label:"两位数的减法（不退位）",type:"sub",min:10,max:99,noBorrow:true},{id:"g1_2d_sub_borrow",label:"两位数的减法（退位）",type:"sub",min:10,max:99,needBorrow:true}],
2:[1,2,3,4,5,6,7,8,9].map(n=>({id:`g2_mul_${n}`,label:`${n}的乘法`,type:"mulBy",n})).concat([{id:"g2_mul_table",label:"乘法口诀",type:"mulTable"}]),
3:[{id:"g3_addsub_1000",label:"1000以内加减法",type:"mixAddSub",max:1000},{id:"g3_mul_2x1",label:"两位数 × 一位数",type:"mul",minA:10,maxA:99,minB:2,maxB:9},{id:"g3_mul_3x1",label:"三位数 × 一位数",type:"mul",minA:100,maxA:999,minB:2,maxB:9},{id:"g3_div_2x1",label:"两位数 ÷ 一位数（整除）",type:"divExact",qMin:10,qMax:99,dMin:2,dMax:9},{id:"g3_div_remainder",label:"有余数的除法",type:"divRemainder"},{id:"g3_mul_2x2",label:"两位数 × 两位数",type:"mul",minA:10,maxA:99,minB:10,maxB:99},{id:"g3_fraction_simple",label:"简单同分母分数加减法",type:"fractionSame"}],
4:[{id:"g4_big_addsub",label:"万以内加减法",type:"mixAddSub",max:10000},{id:"g4_mul_3x2",label:"三位数 × 两位数",type:"mul",minA:100,maxA:999,minB:10,maxB:99},{id:"g4_div_3x2",label:"三位数 ÷ 两位数（整除）",type:"divExact",qMin:10,qMax:99,dMin:10,dMax:99},{id:"g4_mixed_ops",label:"整数四则混合运算",type:"mixedOps"},{id:"g4_decimal_1",label:"一位小数加减法",type:"decimalAddSub",places:1},{id:"g4_simple",label:"运算定律简算",type:"lawSimple"}],
5:[{id:"g5_decimal_addsub",label:"小数加减法",type:"decimalAddSub",places:2},{id:"g5_decimal_mul",label:"小数乘法",type:"decimalMul"},{id:"g5_decimal_div",label:"小数除法（整除型）",type:"decimalDiv"},{id:"g5_factor",label:"因数与倍数",type:"factorMultiple"},{id:"g5_fraction_addsub",label:"同分母分数加减法",type:"fractionSame"},{id:"g5_equation",label:"简易方程",type:"equation"}],
6:[{id:"g6_fraction_addsub",label:"分数加减法",type:"fractionSame"},{id:"g6_fraction_mul",label:"分数乘法",type:"fractionMul"},{id:"g6_fraction_div",label:"分数除法",type:"fractionDiv"},{id:"g6_percent",label:"百分数口算",type:"percent"},{id:"g6_ratio",label:"比与比例基础",type:"ratio"},{id:"g6_mixed",label:"六年级综合口算",type:"grade6Mixed"}]
};
let currentGrade=localStorage.getItem(STORAGE_KEY)||"1",selectedTypes=[],showAnswers=false,questions=[];
const $=id=>document.getElementById(id),gradeSelect=$("gradeSelect"),typeList=$("typeList"),answerSwitch=$("answerSwitch"),questionsEl=$("questions"),subtitleEl=$("subtitle");
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min} function pick(a){return a[rand(0,a.length-1)]} function gcd(a,b){return b===0?Math.abs(a):gcd(b,a%b)} function simp(n,d){if(n===0)return"0";let g=gcd(n,d);return `${n/g}/${d/g}`} function fmt(n){return String(Number(n.toFixed(2)))} function carry(a,b){return a%10+b%10>=10} function borrow(a,b){return a%10<b%10}
function generateAdd(c){let min=c.min||0,max=c.max||100,a,b;for(let i=0;i<1000;i++){a=rand(min,max);b=rand(0,Math.max(0,max-a));if((!c.noCarry||!carry(a,b))&&(!c.needCarry||carry(a,b)))break}return{text:`${a} + ${b} =`,answer:String(a+b)}}
function generateSub(c){let min=c.min||0,max=c.max||100,a,b;for(let i=0;i<1000;i++){a=rand(min,max);b=rand(0,a);if((!c.noBorrow||!borrow(a,b))&&(!c.needBorrow||borrow(a,b)))break}return{text:`${a} − ${b} =`,answer:String(a-b)}}
function genMul(c){let a=rand(c.minA||1,c.maxA||9),b=rand(c.minB||1,c.maxB||9);return{text:`${a} × ${b} =`,answer:String(a*b)}}
function genMulBy(c){let b=rand(1,9);return{text:`${c.n} × ${b} =`,answer:String(c.n*b)}} function genMulTable(){let a=rand(1,9),b=rand(1,9);return{text:`${a} × ${b} =`,answer:String(a*b)}}
function genDivExact(c){let d=rand(c.dMin||2,c.dMax||9),q=rand(c.qMin||2,c.qMax||99);return{text:`${d*q} ÷ ${d} =`,answer:String(q)}} function genDivRem(){let d=rand(2,9),q=rand(2,20),r=rand(1,d-1);return{text:`${d*q+r} ÷ ${d} =`,answer:`${q}……${r}`}}
function genDecAddSub(c){let s=Math.pow(10,c.places||1),a=rand(1,999)/s,b=rand(1,999)/s;if(Math.random()>.5)return{text:`${a} + ${b} =`,answer:fmt(a+b)};let big=Math.max(a,b),small=Math.min(a,b);return{text:`${big} − ${small} =`,answer:fmt(big-small)}}
function genDecMul(){let a=rand(1,99)/10,b=rand(1,9);return{text:`${a} × ${b} =`,answer:fmt(a*b)}} function genDecDiv(){let b=rand(2,9),q=rand(2,90)/10;return{text:`${fmt(b*q)} ÷ ${b} =`,answer:fmt(q)}}
function genFractionSame(){let d=rand(3,12),a=rand(1,d-1),b=rand(1,d-1);if(Math.random()>.5)return{text:`${a}/${d} + ${b}/${d} =`,answer:simp(a+b,d)};let big=Math.max(a,b),small=Math.min(a,b);return{text:`${big}/${d} − ${small}/${d} =`,answer:simp(big-small,d)}}
function genFractionMul(){let a=rand(1,9),b=rand(2,10),c=rand(1,9),d=rand(2,10);return{text:`${a}/${b} × ${c}/${d} =`,answer:simp(a*c,b*d)}} function genFractionDiv(){let a=rand(1,9),b=rand(2,10),c=rand(1,9),d=rand(2,10);return{text:`${a}/${b} ÷ ${c}/${d} =`,answer:simp(a*d,b*c)}}
function genPercent(){let base=pick([50,80,100,120,150,200,300,400]),p=pick([5,10,20,25,50,75]);return{text:`${base} 的 ${p}% =`,answer:String(base*p/100)}} function genRatio(){let a=rand(2,12),b=rand(2,12),m=rand(2,9);return{text:`${a}:${b} = ${a*m}:□`,answer:String(b*m)}}
function genMixedOps(){let a=rand(10,99),b=rand(2,9),c=rand(1,30);return{text:`${a} + ${b} × ${c} =`,answer:String(a+b*c)}} function genLawSimple(){let a=rand(10,99),b=pick([25,50,125]),c=rand(2,8);return{text:`${a} + ${b} + ${c*b} =`,answer:String(a+b+c*b)}}
function genFactorMultiple(){let a=rand(2,9),b=rand(2,12);return{text:`${a} × □ = ${a*b}`,answer:String(b)}} function genEquation(){let x=rand(2,50),a=rand(2,30);return{text:`x + ${a} = ${x+a}`,answer:String(x)}}
function genQ(c){switch(c.type){case"add":return generateAdd(c);case"sub":return generateSub(c);case"mixAddSub":return Math.random()>.5?generateAdd(c):generateSub(c);case"mul":return genMul(c);case"mulBy":return genMulBy(c);case"mulTable":return genMulTable();case"divExact":return genDivExact(c);case"divRemainder":return genDivRem();case"decimalAddSub":return genDecAddSub(c);case"decimalMul":return genDecMul();case"decimalDiv":return genDecDiv();case"fractionSame":return genFractionSame();case"fractionMul":return genFractionMul();case"fractionDiv":return genFractionDiv();case"percent":return genPercent();case"ratio":return genRatio();case"mixedOps":return genMixedOps();case"lawSimple":return genLawSimple();case"factorMultiple":return genFactorMultiple();case"equation":return genEquation();case"grade6Mixed":return pick([genFractionSame,genFractionMul,genFractionDiv,genPercent,genRatio,()=>genDecAddSub({places:2})])();default:return generateAdd({max:20})}}
function setDefaultTypes(){selectedTypes=gradeConfigs[currentGrade].slice(0,Math.min(3,gradeConfigs[currentGrade].length)).map(i=>i.id)}
function createQuestions(){let configs=gradeConfigs[currentGrade].filter(i=>selectedTypes.includes(i.id));let pool=configs.length?configs:gradeConfigs[currentGrade];questions=Array.from({length:QUESTION_COUNT},(_,i)=>({id:i+1,...genQ(pick(pool))}));renderQuestions()}
function renderTypes(){typeList.innerHTML="";gradeConfigs[currentGrade].forEach(item=>{let label=document.createElement("label");label.className="type-item";label.innerHTML=`<input type="checkbox" value="${item.id}" ${selectedTypes.includes(item.id)?"checked":""}/><span>${item.label}</span>`;let input=label.querySelector("input");input.addEventListener("change",()=>{selectedTypes=input.checked?[...selectedTypes,item.id]:selectedTypes.filter(id=>id!==item.id);createQuestions()});typeList.appendChild(label)})}
function renderQuestions(){subtitleEl.textContent=`${currentGrade}年级 · 共 ${QUESTION_COUNT} 题`;let perCol=Math.ceil(QUESTION_COUNT/3);questionsEl.innerHTML="";for(let c=0;c<3;c++){let col=document.createElement("div");col.className="q-col";questions.slice(c*perCol,(c+1)*perCol).forEach(q=>{let div=document.createElement("div");div.className="question";div.innerHTML=`<span class="index">${q.id}.</span><span>${q.text}</span>${showAnswers?`<span class="answer">${q.answer}</span>`:""}`;col.appendChild(div)});questionsEl.appendChild(col)}}
function drawCanvas(){const W=794,H=1123,canvas=document.createElement("canvas");canvas.width=W*2;canvas.height=H*2;const ctx=canvas.getContext("2d");ctx.scale(2,2);ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.fillStyle="#111827";ctx.font="700 25px -apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei";ctx.fillText("口算练习题",56,68);ctx.fillStyle="#64748b";ctx.font="13px -apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei";ctx.fillText(`${currentGrade}年级 · 共 ${QUESTION_COUNT} 题`,56,92);ctx.fillText("姓名：________ 日期：________",545,92);ctx.strokeStyle="#e5e7eb";ctx.beginPath();ctx.moveTo(56,110);ctx.lineTo(738,110);ctx.stroke();const perCol=Math.ceil(QUESTION_COUNT/3),colW=(794-112-60)/3;ctx.font="16px -apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei";for(let c=0;c<3;c++){let x=56+c*(colW+30),y=140;questions.slice(c*perCol,(c+1)*perCol).forEach((q,i)=>{ctx.fillStyle="#94a3b8";ctx.font="11px -apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei";ctx.textAlign="right";ctx.fillText(`${q.id}.`,x+26,y);ctx.textAlign="left";ctx.fillStyle="#111827";ctx.font="16px -apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei";ctx.fillText(q.text,x+34,y);if(showAnswers){ctx.fillStyle="#64748b";ctx.fillText(q.answer,x+120,y)}y+=31})}return canvas}
function downloadImage(){let canvas=drawCanvas(),a=document.createElement("a");a.download=`口算练习题-${currentGrade}年级.png`;a.href=canvas.toDataURL("image/png");a.click()}
function init(){if(!gradeConfigs[currentGrade])currentGrade="1";gradeSelect.value=currentGrade;setDefaultTypes();renderTypes();createQuestions()}gradeSelect.addEventListener("change",()=>{currentGrade=gradeSelect.value;localStorage.setItem(STORAGE_KEY,currentGrade);setDefaultTypes();renderTypes();createQuestions()});answerSwitch.addEventListener("change",()=>{showAnswers=answerSwitch.checked;renderQuestions()});$("refreshBtn").addEventListener("click",createQuestions);$("downloadBtn").addEventListener("click",downloadImage);init();
</script>
</body>
</html>
